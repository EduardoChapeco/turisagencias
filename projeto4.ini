  Download: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
};

// ==========================================
// HELPERS & TRATAMENTO DE DADOS
// ==========================================
const fileToBase64 = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = () => resolve(reader.result.split(',')[1]);
  reader.onerror = error => reject(error);
});

const sanitizeData = (obj) => {
  if (typeof obj === 'string') {
    const val = obj.trim().toLowerCase();
    return (val === 'null' || val === 'undefined' || val === '') ? '' : obj;
  }
  if (Array.isArray(obj)) return obj.map(sanitizeData);
  if (typeof obj === 'object' && obj !== null) {
    const newObj = {};
    for (let key in obj) { newObj[key] = sanitizeData(obj[key]); }
    return newObj;
  }
  return obj || '';
};

const BlankLine = ({ w = '100%' }) => (
  <span 
    className="inline-block border-b border-[#1A2B47] opacity-20 h-[0.7em] transition-all" 
    style={{ minWidth: w, width: w === '100%' ? '100%' : 'auto' }} 
  />
);

const renderField = (val, minW = '40px') => {
  if (!val || String(val).trim() === '' || String(val).toLowerCase() === 'null') {
    return <BlankLine w={minW} />;
  }
  return val;
};

// ==========================================
// MOTOR DE IA (OCR SUPERVISIONADO)
// ==========================================
const apiKey = ""; 

const callGeminiWithRetry = async (apiKey, filesParts, retries = 5, delay = 1000) => {
  const prompt = `Você é um auditor de contratos de turismo de elite (Extrator de OCR).
  Siga o formato JSON rigorosamente. Instruções de Extração em Cadeia:
  1. TITULARES: Encontre quem comprou/pagou. Se tiver mais de um pagante, faça uma lista. NUNCA classifique 'Evellyn dos Santos', 'Excelência Tour', 'Excelencia Tur Chapeco' ou CNPJ 36.620.341/0001-07 como cliente, titular ou passageiro (ela é a agência).
  2. CPFs E DATAS: Extraia CPFs com exatidão (busque números de 11 dígitos). Formate datas para DD/MM/AAAA.
  3. PACOTE: Identifique Operadora (FRT, Orinter, CVC, etc.), Código/Localizador da Reserva, e preencha Data de Embarque e Retorno.
  4. SERVIÇOS: Liste em detalhes hotéis, voos, transfers.
  5. VALOR: Formate como dinheiro e descreva o método de pagamento real.
  6. PASSAGEIROS: Liste o nome e documento/nascimento de todos que vão viajar.
  Se uma informação não existir, retorne "".`;

  const payload = {
    contents: [{ role: "user", parts: [{ text: prompt }, ...filesParts] }],
    generationConfig: { 
      responseMimeType: "application/json", 
      responseSchema: {
        type: "OBJECT",
        properties: {
          titulares: { type: "ARRAY", items: { type: "OBJECT", properties: { nome: {type:"STRING"}, cpf: {type:"STRING"}, contato: {type:"STRING"}, nascimento: {type:"STRING"}, email: {type:"STRING"}, endereco: {type:"STRING"} }}},
          pacote: { type: "OBJECT", properties: { id: {type:"STRING"}, operadora: {type:"STRING"}, ida: {type:"STRING"}, volta: {type:"STRING"}, itens: {type:"ARRAY", items:{type:"STRING"}}, formaPagamento: {type:"STRING"}, total: {type:"STRING"} }},
          passageiros: { type: "ARRAY", items: { type: "OBJECT", properties: { nome: {type:"STRING"}, cpf: {type:"STRING"}, nascimento: {type:"STRING"} }}}
        }
      },
      temperature: 0.1 
    }
  };

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!response.ok) throw new Error(`HTTP Error`);
    const result = await response.json();
    return sanitizeData(JSON.parse(result.candidates[0].content.parts[0].text));
  } catch (error) {
    if (retries > 0) {
      await new Promise(res => setTimeout(res, delay));
      return callGeminiWithRetry(apiKey, filesParts, retries - 1, delay * 2);
    }
    throw error;
  }
};

