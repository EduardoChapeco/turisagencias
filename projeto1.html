    <template id="ai-prompt-master">
        Você é o Auditor Especialista em OCR da Excelência Tour. Sua função é analisar Contratos de Viagem (Orinter,
        FRT, etc), Recibos e Vouchers e extrair os dados.

        REGRAS DE EXTRAÇÃO CIRÚRGICAS:
        1. HIGIENE DE NOMES: O OCR cola palavras. Se ler "VALDECIRONIOMOSKI", corrija para "Valdecir Antonio Gromoski".
        2. REGRA ANTI-AGÊNCIA: Você NUNCA deve extrair a agência como cliente. IGNORE SUMARIAMENTE os nomes "Evellyn dos
        Santos", "Evelyn dos Santos", "Excelência Tour", "Excelencia Tur" ou a palavra "Faturado". Eles não são
        viajantes nem pagantes, são os intermediários.
        3. PAGANTES: Mapeie na array "pagantes" apenas os clientes REAIS que compraram o pacote. Extraia todos os dados
        deles (CPF, RG, Nascimento, Endereço, E-mail, Telefones).
        4. VIAJANTES/ACOMPANHANTES: Mapeie TODOS os passageiros que vão viajar na array "acompanhantes". Extraia o CPF,
        RG e Nascimento de cada um.
        ATENÇÃO: Nos contratos de turismo, os CPFs geralmente ficam na tabela ao lado dos nomes (em colunas como
        "Documento" ou "CPF"). Procure ativamente o CPF de todos os passageiros.
        5. SANITIZAÇÃO TOTAL: NUNCA use as palavras "null", "undefined", "OFF" ou similares. Se não encontrou o dado
        exato no PDF, preencha com "".
    </template>
</head>

    <script>
        const apiKey = "";

        // ESTADO GLOBAL DA APLICAÇÃO
        window.viagemState = { destino: '', data: '', loc: '', fotoB64: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23cbd5e1'%3E%3Ccircle cx='12' cy='8' r='4'/%3E%3Cpath d='M12 14c-4.42 0-8 2-8 6v1h16v-1c0-4-3.58-6-8-6z'/%3E%3C/svg%3E" };

        // O sistema começa com 1 pagante vazio para garantir o UI
        window.pagantesState = [
            { nome: '', cpf: '', nascimento: '', telefone: '', email: '', endereco: '', cep: '', profissao: '', rg: '', passaporte: '' }
        ];

        window.paxState = [];

        // ── CONTROLES DA INTERFACE ──
        function toggleSidebar() {
            const sb = document.getElementById('sidebar-cms');
            const icon = document.getElementById('icon-toggle-menu');
            const text = document.getElementById('text-toggle-menu');

            sb.classList.toggle('collapsed');
            if (sb.classList.contains('collapsed')) {
                icon.className = 'fas fa-chevron-right mr-2';
                text.innerText = 'Mostrar Editor';
            } else {
                icon.className = 'fas fa-chevron-left mr-2';
                text.innerText = 'Ocultar Editor';
            }
            setTimeout(ajustarScaleCanvas, 400);
        }

        function ajustarScaleCanvas() {
            const pane = document.querySelector('.preview-pane');
            const scaler = document.getElementById('preview-scaler');
            if (!pane || !scaler) return;
            const availableWidth = pane.clientWidth - 80;
            // Largura fixa da A4 = 800px
            const scale = Math.min(1, availableWidth / 800);
            scaler.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', ajustarScaleCanvas);

        function showToast(msg, type = 'success') {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `p-4 rounded-xl text-[11px] font-black text-white shadow-2xl transition-all border flex items-center gap-3 ${type === 'success' ? 'bg-brand border-brand' : 'bg-danger border-red-800'}`;
            t.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle text-accent' : 'fa-exclamation-triangle'} text-lg"></i> <span>${msg.toUpperCase()}</span>`;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300) }, 4000);
        }

        function toggleLoading(s, t = "Processando...") {
            const overlay = document.getElementById('loading-overlay');
            if (s) {
                document.getElementById('loading-text').innerText = t.toUpperCase();
                overlay.classList.remove('hidden');
                overlay.classList.add('flex');
            } else {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
            }
        }

        const toB64 = f => new Promise((r, j) => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.readAsDataURL(f) });

        // ── MOTOR DE HIGIENIZAÇÃO (A FILTRAGEM FINAL) ──
        // Remove lixo de OCR e impede a Agência de ser cadastrada
        function limparLixoOCR(val) {
            if (!val) return "";
            let v = String(val).trim();
            if (v.toLowerCase() === "null" || v.toLowerCase() === "undefined" || v === "OFF" || v === "off") return "";
            return v;
        }

        // Bloqueio Hardcoded para o nome e documentos da Agência
        function isAgencia(nome, cpf) {
            const bloqueadosNome = ['excelência tour', 'excelencia tur', 'evellyn dos santos', 'evelyn dos santos', 'faturado', 'agência de viagens'];
            const bloqueadosDoc = ['36620341000107', '08613921914', '36.620.341/0001-07', '086.139.219-14'];

            if (nome) {
                const n = nome.toLowerCase();
                if (bloqueadosNome.some(b => n.includes(b))) return true;
            }
            if (cpf) {
                const c = cpf.replace(/\D/g, ''); // Remove pontuação
                if (bloqueadosDoc.some(b => c.includes(b.replace(/\D/g, '')))) return true;
            }
            return false;
        }

        // ── MOTOR DE ATUALIZAÇÃO DOM & RENDERIZAÇÃO A4 (Slicing Nativo) ──
        function atualizarPreview() {
            // Salva o state de viagem
            window.viagemState.destino = limparLixoOCR(document.getElementById('f-destino').value);
            window.viagemState.data = limparLixoOCR(document.getElementById('f-data').value);
            window.viagemState.loc = limparLixoOCR(document.getElementById('f-loc').value);

            const renderContainer = document.getElementById('a4-container');
            renderContainer.innerHTML = ''; // Limpa o canvas de preview para reconstruir as A4s

            const emissaoDate = `${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString().substring(0, 5)}`;

            // 1. GERAÇÃO DE PÁGINAS PARA PAGANTES
            const pagantesValidos = window.pagantesState.filter(p => limparLixoOCR(p.nome) !== '' || limparLixoOCR(p.cpf) !== '');

            if (pagantesValidos.length === 0) {
                // Renderiza 1 pagante vazio no HTML A4 para não sumir a tela de preview inicial
                pagantesValidos.push({ nome: '', cpf: '', nascimento: '', telefone: '', email: '', endereco: '', cep: '', profissao: '', rg: '', passaporte: '' });
            }

            pagantesValidos.forEach((pag, i) => {
                const isSecPaganteVisible = (pag.nome || pag.cpf || pag.nascimento || pag.profissao || pag.telefone || pag.email || pag.endereco || pag.cep || pag.rg || pag.passaporte);
                const isSecViagemVisible = (window.viagemState.destino || window.viagemState.data || window.viagemState.loc);

                const htmlPagante = `
                    <div class="a4-page">
                        <div class="f-header">
                            <div>
                                <div class="f-brand-name">Excelência Tour</div>
                                <div class="f-subtitle">FICHA CADASTRAL B2C • TITULAR/PAGANTE ${pagantesValidos.length > 1 ? `#${i + 1}` : ''}</div>
                            </div>
                            <div style="text-align: right">
                                <div style="font-size: 11px; font-weight: 900; color: #4f46e5; font-family: 'Space Mono', monospace;">EMISSÃO: ${emissaoDate}</div>
                            </div>
                        </div>

                        ${isSecPaganteVisible ? `
                        <div class="flex gap-8 mb-6">
                            <div class="f-photo-box">
                                <img src="${window.viagemState.fotoB64}" alt="">
                            </div>
                            <div class="flex-1">
                                <div class="f-section-title">Dados do Contratante (Comprador)</div>
                                <div class="f-grid">
                                    ${pag.nome ? `<div class="span-12"><span class="f-label">Nome Completo</span><div class="f-value" style="font-size: 20px; font-weight: 900;">${pag.nome}</div></div>` : ''}
                                    ${pag.cpf ? `<div class="span-4"><span class="f-label">C.P.F.</span><div class="f-value font-mono">${pag.cpf}</div></div>` : ''}
                                    ${pag.nascimento ? `<div class="span-4"><span class="f-label">Data Nasc.</span><div class="f-value font-mono">${pag.nascimento}</div></div>` : ''}
                                    ${pag.profissao ? `<div class="span-4"><span class="f-label">Profissão</span><div class="f-value uppercase">${pag.profissao}</div></div>` : ''}
                                    ${pag.rg ? `<div class="span-4"><span class="f-label">Identidade (RG)</span><div class="f-value font-mono">${pag.rg}</div></div>` : ''}

                                            ${p.rg ? `<div class="span-4"><span class="f-label">RG / Identidade</span><div class="f-value border-none font-mono text-[12px]">${p.rg}</div></div>` : ''}
                                            ${p.passaporte ? `<div class="span-4"><span class="f-label text-blue-600">Passaporte</span><div class="f-value border-none font-mono text-[12px] font-bold text-blue-900">${p.passaporte}</div></div>` : ''}

        // ── INTEGRAÇÃO IA (OCR MÚLTIPLO) ──
        async function fetchWithBackoff(url, payload, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`API HTTP Error ${res.status}: ${errText}`);
                    }
                    return await res.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        async function processarDocIA(files) {
            if (!files.length) return;
            toggleLoading(true, "Lendo Documento e Otimizando Dados...");

            try {
                let parts = [{ text: document.getElementById('ai-prompt-master').innerText }];
                for (let f of files) {
                    const b = await toB64(f);
                    parts.push({ inlineData: { mimeType: f.type, data: b.split(',')[1] } });
                }

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ role: "user", parts }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                pagantes: {
                                    type: "ARRAY",
                                    items: {
                                        type: "OBJECT",
                                        properties: {
                                            nome: { type: "STRING" }, cpf: { type: "STRING" }, nascimento: { type: "STRING" }, profissao: { type: "STRING" },
                                            telefone: { type: "STRING" }, email: { type: "STRING" }, endereco: { type: "STRING" }, cep: { type: "STRING" }, rg: { type: "STRING" }, passaporte: { type: "STRING" }
                                        }
                                    }
                                },
                                viagem: {
                                    type: "OBJECT",
                                    properties: { destino: { type: "STRING" }, data: { type: "STRING" }, localizador: { type: "STRING" } }
                                },
                                acompanhantes: {
                                    type: "ARRAY",
                                    items: {
                                        type: "OBJECT",
                                        properties: { nome: { type: "STRING" }, nascimento: { type: "STRING" }, cpf: { type: "STRING" }, rg: { type: "STRING" }, passaporte: { type: "STRING" } }
                                    }
                                }
                            }
                        }
                    }
                };

                const data = await fetchWithBackoff(url, payload);
                const jsonText = data.candidates[0].content.parts[0].text;

                let cleanJsonText = jsonText.replace(/```json/gi, '').replace(/```/g, '').trim();
                const startIdx = cleanJsonText.indexOf('{');
                const endIdx = cleanJsonText.lastIndexOf('}');
                if (startIdx !== -1 && endIdx !== -1) { cleanJsonText = cleanJsonText.substring(startIdx, endIdx + 1); }
                const json = JSON.parse(cleanJsonText);

                // Trata Pagantes (Verificando a Blacklist)
                if (json.pagantes && json.pagantes.length > 0) {
                    let bloqueouAlguem = false;
                    json.pagantes.forEach(novoPag => {
                        if (!novoPag.nome) return;
                        if (isAgencia(novoPag.nome, novoPag.cpf)) {
                            bloqueouAlguem = true;
                            return; // Ignora a agência
                        }

                        // Atualiza ou Adiciona Pagante
                        const p0 = window.pagantesState[0];
                        if (!p0.nome && !p0.cpf) {
                            window.pagantesState[0] = { ...p0, ...novoPag };
                        } else {
                            const exists = window.pagantesState.findIndex(p => p.nome.toLowerCase() === novoPag.nome.toLowerCase());
                            if (exists === -1) {
                                window.pagantesState.push({ nome: '', cpf: '', nascimento: '', telefone: '', email: '', endereco: '', cep: '', profissao: '', rg: '', passaporte: '', ...novoPag });
                            } else {
                                // Merge aditivo (não apaga o que já existe)
                                for (let key in novoPag) {
                                    if (novoPag[key] && limparLixoOCR(novoPag[key]) !== '' && !window.pagantesState[exists][key]) {
                                        window.pagantesState[exists][key] = novoPag[key];
                                    }
                                }
                            }
                        }
                    });
                    renderCMSPagantes();
                    if (bloqueouAlguem) showToast("Dados da Agência foram bloqueados pelo sistema.", "success");
                }

                // Trata Viagem Global
                if (json.viagem) {
                    const elDest = document.getElementById('f-destino');
                    const elData = document.getElementById('f-data');
                    const elLoc = document.getElementById('f-loc');

                    if (json.viagem.destino && elDest.value === '') elDest.value = json.viagem.destino;
                    if (json.viagem.data && elData.value === '') elData.value = json.viagem.data;
                    if (json.viagem.localizador && elLoc.value === '') elLoc.value = json.viagem.localizador;
                }

                // Trata Acompanhantes (Verificando Blacklist)
                if (json.acompanhantes?.length) {
                    json.acompanhantes.forEach(newP => {
                        if (!newP.nome) return;
                        if (isAgencia(newP.nome, newP.cpf)) return; // Ignora a agência

                        const exists = window.paxState.findIndex(oldP => oldP.nome.toLowerCase() === newP.nome.toLowerCase() || (oldP.cpf === newP.cpf && newP.cpf !== ""));
                        if (exists === -1 && newP.nome.toLowerCase() !== "null") {
                            window.paxState.push(newP);
                        } else if (exists !== -1) {
                            for (let key in newP) {
                                if (newP[key] && limparLixoOCR(newP[key]) !== '' && !window.paxState[exists][key]) {
                                    window.paxState[exists][key] = newP[key];
                                }
                            }
                        }
                    });
                    renderCMSPax();
                }

                atualizarPreview();
                showToast("Informações do documento extraídas com sucesso!");
            } catch (e) {
                console.error(e);
                showToast("O Documento não é legível pela Inteligência Artificial.", "error");
            } finally {
                toggleLoading(false);
                document.getElementById('ai-input').value = '';
            }
        }

        // ── MOTOR DE EXPORTAÇÃO PDF MULTIPAGE ROBUSTO (SEM CORTES) ──
        async function exportarFicha(tipo) {
            // Verifica se tem pagantes
            const nome = window.pagantesState[0]?.nome || 'Cliente';
            const scaler = document.getElementById('preview-scaler');

            toggleLoading(true, "Gerando Documento Oficial A4...");

            // Tira a escala para garantir as dimensões nativas (800x1131)
            const originalTransform = scaler.style.transform;
            scaler.style.transform = "scale(1)";
            window.scrollTo(0, 0);

            // Pausa pro CSS assentar e renderizar o tamanho original
            await new Promise(r => setTimeout(r, 600));

            try {
                // Seleciona as páginas reais do DOM geradas pelo atualizarPreview()
                const pages = document.querySelectorAll('.a4-page');
                if (pages.length === 0) throw new Error("Sem páginas para renderizar.");

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfW = pdf.internal.pageSize.getWidth();
                const pdfH = pdf.internal.pageSize.getHeight();

                for (let i = 0; i < pages.length; i++) {
                    const canvas = await html2canvas(pages[i], {
                        scale: 3, // Resolução premium anti-blur
                        useCORS: true,
                        backgroundColor: '#ffffff',
                        logging: false
                    });

                    const imgData = canvas.toDataURL('image/jpeg', 0.98);

                    if (i > 0) pdf.addPage();

                    // Cada .a4-page é encaixada perfeitamente numa página do PDF, impossível cortar no meio!
                    pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
                }

                let nomeArquivo = "Cliente";
                if (window.pagantesState[0] && window.pagantesState[0].nome) {
                    nomeArquivo = window.pagantesState[0].nome.replace(/\s+/g, '_');
                }

                pdf.save(`Ficha_Excelencia_Tour_${nomeArquivo}.pdf`);
                showToast("O PDF Oficial foi renderizado com sucesso!");
            } catch (e) {
                console.error(e);
                showToast("Falha técnica no Motor de Imagem.", "error");
            } finally {
                scaler.style.transform = originalTransform;
                toggleLoading(false);
            }
        }

        // Inicialização
        window.onload = () => {
            renderCMSPagantes();
            renderCMSPax();

            // Timeout leve garante que o CSS rodou antes de setar o zoom
            setTimeout(() => {
                ajustarScaleCanvas();
                atualizarPreview();
            }, 100);
        };
    </script>
