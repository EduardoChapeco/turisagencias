  const handleDownloadPDF = async () => {
    if (!window.html2pdf) {
      alert("A biblioteca de PDF ainda está carregando. Tente novamente em 2 segundos.");
      return;
    }
    
    setIsGeneratingPDF(true);
    const element = document.getElementById('document-preview');
    
    // Configuração Premium para PDF não cortar linhas
    const opt = {
      margin:       [10, 0, 10, 0], // Margem de segurança vertical
      filename:     `Contrato_Excelencia_Tour_${titulares[0]?.nome?.replace(/\s+/g, '_') || 'Cliente'}.pdf`,
      image:        { type: 'jpeg', quality: 0.98 },
      html2canvas:  { scale: 2, useCORS: true, letterRendering: true, windowWidth: 1024 },
      jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak:    { mode: ['css', 'legacy'] } // Crucial para não cortar parágrafos
    };

    try {
      await window.html2pdf().set(opt).from(element).save();
    } catch (error) {
      console.error("Erro ao gerar PDF:", error);
      alert("Ocorreu um erro ao gerar o PDF. Verifique sua conexão.");
    } finally {
      setIsGeneratingPDF(false);
    }
  };

  const handleFileChange = (e) => {
    if (e.target.files && e.target.files.length > 0) setSelectedFiles(Array.from(e.target.files));
  };

  const analyzeDocuments = async () => {
    if (selectedFiles.length === 0) return setErrorMsg("Selecione os arquivos primeiro.");
    setIsAnalyzing(true);
    setErrorMsg('');
    
    try {
      const filesParts = await Promise.all(selectedFiles.map(async (file) => ({
        inlineData: { mimeType: file.type, data: await fileToBase64(file) }
      })));

      const data = await callGeminiWithRetry(apiKey, filesParts);
      
      // Filtro de Segurança Profundo
      if (data.titulares?.length > 0) {
        const filtrados = data.titulares.filter(t => {
          const nome = (t.nome || '').toLowerCase();
          return !nome.includes('evellyn') && !nome.includes('excelência') && !nome.includes('excelencia');
        });
        if (filtrados.length > 0) setTitulares(filtrados);
      }

      if (data.pacote) setPacote(prev => ({ ...prev, ...data.pacote }));
      
