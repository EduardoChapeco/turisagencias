      <div className="flex-1 flex flex-col relative z-10 h-full bg-[#E6EBF0] print-reset-scroll">
        
        {/* HEADER SUPERIOR (BARRA DE FERRAMENTAS CLARA E VISÍVEL) */}
        <div className="bg-white border-b border-gray-200 p-4 flex items-center justify-between shadow-sm z-20 font-body relative no-print shrink-0">
          <div className="flex items-center gap-3">
            {!isSidebarOpen && <button onClick={() => setIsSidebarOpen(true)} className="p-2.5 bg-[#E8F2FA] text-[#1A2B47] rounded-lg shadow-sm hover:bg-[#C8DCED] transition-colors"><Icons.ChevronRight /></button>}
            <h1 className="text-[#1A2B47] font-bold text-lg hidden md:block">Gerador de Contratos - A4</h1>
          </div>
          
          {/* BOTÕES DE AÇÃO RESTAURADOS E BLINDADOS (GRANDES) */}
          <div className="flex items-center gap-3">
            <button onClick={handleOpenNewTab} className="flex items-center gap-2 px-4 py-2.5 bg-[#E8F2FA] text-[#1A2B47] rounded-lg hover:bg-[#C8DCED] transition-colors shadow-sm font-semibold text-sm">
              <Icons.External /> <span className="hidden sm:inline">Tela Cheia</span>
            </button>
            <button onClick={handlePrintNativo} className="flex items-center gap-2 px-4 py-2.5 bg-[#E8F2FA] text-[#1A2B47] rounded-lg hover:bg-[#C8DCED] transition-colors shadow-sm font-semibold text-sm">
              <Icons.Printer /> <span className="hidden lg:inline">Imprimir Padrão</span>
            </button>
            <button onClick={handleDownloadPDF} disabled={isGeneratingPDF} className="flex items-center gap-2 px-5 py-2.5 bg-[#1A2B47] text-white rounded-lg hover:bg-[#2C4A6E] transition-transform active:scale-95 shadow-md font-bold text-sm disabled:bg-gray-400">
              <Icons.Download /> <span className="hidden sm:inline">{isGeneratingPDF ? "Processando..." : "Baixar PDF"}</span>
            </button>
          </div>
        </div>

        {/* Canva Scroll Engine */}
        <div className="flex-1 overflow-auto p-4 md:p-8 flex flex-col items-center w-full h-full font-body print-reset-scroll">
          
          <div id="document-preview" className="a4-container contract-text relative text-[#1A2B47]">
            
            <div className="flex flex-col items-center border-b-[2px] border-[#6EC3EC] pb-5 mb-5">
               <img src={LOGO_AGENCIA_URL} alt="Excelência Tour" className="max-h-20 object-contain mb-3" />
               <h1 className="text-[22px] font-display font-bold tracking-[0.12em] uppercase m-0 leading-tight">Excelência Tour Chapecó</h1>
               <h2 className="text-[9.5px] font-bold text-[#2C4A6E] uppercase tracking-[0.22em] text-center mt-1">Condições Gerais de Contrato de Prestação de Serviços Turísticos</h2>
            </div>

            <section className="mb-5 avoid-break">
              <h3 className="font-display font-bold uppercase text-[15px] border-b-[1.5px] border-[#87CEEB] pb-0.5 mb-3">Dados Pessoais (Contratantes)</h3>
              <div className="flex flex-col gap-3">
                {titulares.map((t, i) => (
                  <div key={i} className={`flex flex-col gap-1.5 ${i > 0 ? 'pt-3 border-t border-[rgba(26,43,71,0.08)]' : ''}`}>
                    <div className="w-full">
                      <span className="font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em] block leading-none mb-0.5">Nome Completo</span> 
                      <span className="uppercase font-semibold text-[13.5px] leading-tight break-words">{renderField(t.nome)}</span>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                      <div><span className="font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em] block leading-none mb-0.5">CPF / Documento</span><span className="text-[13px] leading-tight break-words">{renderField(t.cpf)}</span></div>
                      <div><span className="font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em] block leading-none mb-0.5">Data de Nascimento</span><span className="text-[13px] leading-tight break-words">{renderField(t.nascimento)}</span></div>
                      <div><span className="font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em] block leading-none mb-0.5">Contato</span><span className="text-[13px] leading-tight break-words">{renderField(t.contato)}</span></div>
                      <div><span className="font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em] block leading-none mb-0.5">E-mail</span><span className="text-[13px] leading-tight break-all">{renderField(t.email)}</span></div>
                    </div>
                    <div><span className="font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em] block leading-none mb-0.5">Endereço Completo</span><span className="text-[13px] leading-tight break-words">{renderField(t.endereco)}</span></div>
                  </div>
                ))}
              </div>
            </section>

            <section className="mb-5 avoid-break">
              <div className="flex justify-between items-end border-b-[1.5px] border-[#87CEEB] pb-0.5 mb-3">
                <h3 className="m-0 border-none p-0 font-display font-bold text-[15px] uppercase">Pacote Contratado</h3>
                <div className="text-[10px] font-bold text-[#2C4A6E]">
                  ID: <span className="text-[#1A2B47] mr-3">{renderField(pacote.id, '40px')}</span>
                  OPERADORA: <span className="text-[#1A2B47] uppercase">{renderField(pacote.operadora, '60px')}</span>
                </div>
              </div>
              
              <div className="grid grid-cols-2 gap-4 mb-3">
                 <div className="bg-[#FAF8F5] p-2.5 border border-[rgba(26,43,71,0.05)] rounded">
                    <span className="font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em] block mb-0.5">Data de Embarque</span> 
                    <span className="font-bold text-[13.5px]">{renderField(pacote.ida)}</span>
                 </div>
                 <div className="bg-[#FAF8F5] p-2.5 border border-[rgba(26,43,71,0.05)] rounded">
                    <span className="font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em] block mb-0.5">Data de Retorno</span> 
                    <span className="font-bold text-[13.5px]">{renderField(pacote.volta)}</span>
                 </div>
              </div>

              <p className="font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em] mb-1.5 mt-2">Serviços Inclusos no Pacote</p>
              <div className="pl-1 text-[13px] font-medium leading-tight">
                {pacote.itens.length > 0 ? (
                  <ul className="list-disc list-inside space-y-0.5">
                    {pacote.itens.map((item, i) => <li key={i} className="break-words">{item}</li>)}
                  </ul>
                ) : <p className="italic text-gray-400 text-xs">Nenhum serviço mapeado no formulário.</p>}
              </div>
            </section>

            <section className="mb-5 avoid-break">
              <h3 className="font-display font-bold uppercase text-[15px] border-b-[1.5px] border-[#87CEEB] pb-0.5 mb-2">Relação de Passageiros</h3>
              <table className="w-full text-[13px] text-left border-collapse table-fixed">
                <thead>
                  <tr className="border-b-[1.5px] border-[#1A2B47]">
                    <th className="py-1.5 px-1 w-[50%] font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em]">Nome do Passageiro</th>
                    <th className="py-1.5 px-1 w-[25%] font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em]">Documento Oficial</th>
                    <th className="py-1.5 px-1 w-[25%] font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em]">Data de Nasc.</th>
                  </tr>
                </thead>
                <tbody>
                  {passageiros.length > 0 ? passageiros.map((p, i) => (
                    <tr key={i} className="border-b border-[rgba(26,43,71,0.08)]">
                      <td className="py-1.5 px-1 uppercase font-semibold break-words leading-tight">{renderField(p.nome)}</td>
                      <td className="py-1.5 px-1 break-words">{renderField(p.cpf)}</td>
                      <td className="py-1.5 px-1 break-words">{renderField(p.nascimento)}</td>
                    </tr>
                  )) : <tr><td colSpan="3" className="py-2"><BlankLine /></td></tr>}
                </tbody>
              </table>
            </section>

            <section className="mb-6 avoid-break">
              <h3 className="font-display font-bold uppercase text-[15px] border-b-[1.5px] border-[#87CEEB] pb-0.5 mb-3">Investimento e Liquidação</h3>
              <div className="border-l-[3.5px] border-[#6EC3EC] pl-4 py-1.5 bg-[#FAF8F5] rounded-r">
                <div className="mb-2">
                  <span className="font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em] block">Total Acordado da Viagem</span>
                  <span className="text-[17px] font-bold text-[#1A2B47]">R$ {renderField(pacote.total)}</span>
                </div>
                <div>
                  <span className="font-bold text-[#2C4A6E] text-[9.5px] uppercase tracking-[0.05em] block mb-0.5">Descrição da Forma de Pagamento</span>
                  <div className="uppercase font-semibold text-[13px] leading-snug break-words whitespace-pre-wrap">{renderField(pacote.formaPagamento)}</div>
                </div>
              </div>
            </section>

            <div className="mb-6 text-justify bg-[#F5F8FA] p-4 rounded-lg border border-[#E8F2FA] text-[13px] leading-relaxed avoid-break">
              <p className="mb-1">
                Pelo presente instrumento particular, de um lado a empresa <strong>EVELLYN DOS SANTOS AGENCIA DE VIAGENS</strong>, situada em Chapecó, Estado de Santa Catarina, na Avenida Nereu Ramos, nº 576 E, Centro, CEP: 89801-020 inscrita no CNPJ sob n° <strong>36.620.341/0001-07</strong> doravante simplesmente denominada <strong>Contratada</strong>, por seu representante abaixo assinado e, de outro o <strong>Contratante</strong>, qualificado no anverso, tem entre si justo e acertado o presente Instrumento Contratual de Prestação de Serviços Turísticos, o qual será regido pelas cláusulas e condições abaixo discriminadas:
              </p>
              <p className="font-bold uppercase tracking-[0.05em] text-[11px] mt-2">Tem entre si, justo e contratado o quanto segue:</p>
            </div>

            <section className="contract-clauses">
              {FIXED_CLAUSES.map((c) => {
                let tit = null;
                if (c.num === 1) tit = "DO OBJETO DO CONTRATO";
                if (c.num === 3) tit = "DOS VALORES E FORMA DE PAGAMENTO";
                if (c.num === 5) tit = "DO PAGAMENTO E INADIMPLEMENTO";
                if (c.num === 9) tit = "DAS CONDIÇÕES GERAIS DO CONTRATO";
                if (c.num === 29) tit = "DAS RESPONSABILIDADES DA CONTRATADA";
                if (c.num === 33) tit = "DAS CONDIÇÕES ESPECÍFICAS DO TRANSPORTE AÉREO";
                if (c.num === 45) tit = "RESCISÃO E CANCELAMENTO";
                if (c.num === 49) tit = "ELEIÇÃO DE FORO";
                
                return (
                  <React.Fragment key={c.num}>
                    {tit && <h3 className="avoid-break mt-6 mb-2 text-[15px] font-display font-bold uppercase border-b border-[rgba(26,43,71,0.08)] pb-1">{tit}</h3>}
                    <p className={`text-[13.5px] leading-relaxed text-justify mb-2 ${c.num === 1 ? '' : 'avoid-break'}`}>
                      <strong className="mr-1">Cláusula {c.num}:</strong> {c.text}
                    </p>
                  </React.Fragment>
                );
              })}
              
              {clausulasExtras.length > 0 && (
                <div className="mt-8 pt-3 border-t-[1.5px] border-[#1A2B47] avoid-break">
                  <h3 className="text-[15px] font-display font-bold uppercase mb-2">DISPOSIÇÕES ADICIONAIS</h3>
                  {clausulasExtras.map((ce, i) => (
                    <p key={i} className="text-[13.5px] leading-relaxed text-justify mb-2 avoid-break">
                      <strong className="mr-1">Cláusula Adicional {i+1}:</strong> {ce}
                    </p>
                  ))}
                </div>
              )}
            </section>

            <section className="mt-16 pt-6 w-full">
              <div className="text-[13.5px] mb-20 text-center font-bold font-body avoid-break">Chapecó, Santa Catarina.<br/><br/>Data:</div>
              <div className="flex justify-between px-4 flex-wrap gap-y-16">
                
                <div className="flex flex-col items-center w-[45%] shrink-0 avoid-break">
                  <div className="border-t-[1.2px] border-[#1A2B47] w-full mb-1"></div>
                  <strong className="text-[9.5px] font-body uppercase tracking-[0.1em] mb-1 text-[#2C4A6E]">CONTRATADA</strong>
                  <span className="text-[12px] font-body text-center leading-tight text-[#1A2B47] font-bold">Evellyn dos Santos<br/>Excelência Tour<br/>CNPJ 36.620.341/0001-07</span>
                </div>
                
                {/* Lógica de Assinatura para TODOS os Viajantes (Titulares e Passageiros únicos) */}
                {signersList.map((nome, i) => (
                  <div key={i} className="flex flex-col items-center w-[45%] shrink-0 avoid-break">
                    <div className="border-t-[1.2px] border-[#1A2B47] w-full mb-1"></div>
                    <strong className="text-[9.5px] font-body uppercase tracking-[0.1em] mb-1 text-[#2C4A6E]">CONTRATANTE / VIAJANTE {signersList.length > 1 ? (i+1) : ""}</strong>
                    <span className="text-[12px] font-body text-center uppercase leading-tight text-[#1A2B47] font-bold break-words w-full">{nome || <BlankLine />}</span>
                  </div>
                ))}

              </div>
            </section>

          </div>
        </div>
      </div>
    </div>
  );
}